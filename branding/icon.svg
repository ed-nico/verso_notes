<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b2b35"/>
      <stop offset="1" stop-color="#16161a"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#9fb0ff"/>
      <stop offset="0.55" stop-color="#7c8cff"/>
      <stop offset="1" stop-color="#6fcaa8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#7c8cff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#7c8cff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- squircle background -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#bg)"/>
  <rect x="2" y="2" width="1020" height="1020" rx="231" fill="none" stroke="#3a3a45" stroke-width="2" opacity="0.6"/>
  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#glow)"/>

  <!-- graph "V": two top nodes + apex, two edges -->
  <g fill="none" stroke="url(#stroke)" stroke-width="46" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft)">
    <path d="M 348 372 L 512 668 L 676 372"/>
  </g>
  <g filter="url(#soft)">
    <circle cx="348" cy="372" r="58" fill="#9fb0ff"/>
    <circle cx="676" cy="372" r="58" fill="#8fa1ff"/>
    <circle cx="512" cy="668" r="64" fill="#6fcaa8"/>
  </g>
  <!-- node highlights -->
  <circle cx="334" cy="356" r="18" fill="#ffffff" opacity="0.55"/>
  <circle cx="662" cy="356" r="18" fill="#ffffff" opacity="0.45"/>
  <circle cx="496" cy="650" r="20" fill="#ffffff" opacity="0.5"/>
</svg>
