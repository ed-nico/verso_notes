<svg width="1280" height="380" viewBox="0 0 1280 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="stroke" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#9fb0ff"/>
      <stop offset="0.55" stop-color="#7c8cff"/>
      <stop offset="1" stop-color="#6fcaa8"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ececf4"/>
      <stop offset="1" stop-color="#c7c9e6"/>
