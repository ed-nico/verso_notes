name: Release

# Pushing a version tag (v0.1.0, v0.2.0, …) builds all three installers and
# attaches them to a GitHub Release for that tag. One macOS runner does the lot:
# every dependency is pure JS, so the Linux AppImage and Windows NSIS installer
# cross-build cleanly from macOS (same as `npm run build:win` locally).
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npx electron-vite build
      # --publish never: in CI-with-tag electron-builder defaults to publishing
      # itself (and wants GH_TOKEN); the gh-release step below does the upload.
      - run: npx electron-builder --mac --linux --win --publish never
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.AppImage
            dist/*.exe
          generate_release_notes: true
